<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Agri-Guard AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .reset-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="reset-card text-center">
        <h3 class="mb-3">Reset Password</h3>
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        {% if message %}<div class="alert alert-success">{{ message }}</div>{% endif %}
        
        <form action="/forgot-password" method="POST">
            <div class="mb-3 text-start">
                <label class="form-label text-muted small">Confirm Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label text-muted small">New Password</label>
                <input type="password" name="new_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2">Update Password</button>
        </form>
        <p class="mt-3 small"><a href="/login" class="text-success">Back to Login</a></p>
    </div>
</body>
</html>
