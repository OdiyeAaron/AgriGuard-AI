<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Agri-Guard AI</title>
    <style>
        :root {
            --primary-green: #28a745;
            --dark-green: #1a472a;
            --slu-blue: #004085;
            --anim-speed: 0.6s;
        }

        /* --- 🎞️ ANIMATIONS --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #f0f2f5 0%, #e8f5e9 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .reset-card { 
            background: white; 
            padding: 40px; 
            border-radius: 35px; 
            box-shadow: 0 20px 45px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            animation: fadeInDown var(--anim-speed) ease-out forwards;
            border: 1px solid rgba(0, 64, 133, 0.05);
        }

        .uni-tag { 
            font-size: 10px; 
            letter-spacing: 3px; 
            color: var(--slu-blue); 
            font-weight: 800; 
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        h3 { 
            color: var(--dark-green); 
            margin: 10px 0 25px; 
            font-weight: 700;
            font-size: 24px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #777;
            margin-left: 5px;
            text-transform: uppercase;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            margin-top: 5px;
            border: 1.5px solid #eee; 
            border-radius: 15px; 
            box-sizing: border-box; 
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-green);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.05);
        }

        .btn-update { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary-green); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            margin-top: 10px; 
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.2);
        }

        .btn-update:hover { 
            background: #218838; 
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.3);
        }

        /* --- Alerts --- */
        .alert {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            animation: fadeInDown 0.4s ease;
        }

        .alert-error {
            background: #fff5f5;
            color: #dc3545;
            border: 1px solid #fed7d7;
        }

        .alert-success {
            background: #f0fff4;
            color: #28a745;
            border: 1px solid #c6f6d5;
        }

        .back-link {
            margin-top: 25px;
            font-size: 14px;
        }

        .back-link a {
            color: #888;
            text-decoration: none;
            transition: 0.2s;
        }

        .back-link a:hover {
            color: var(--primary-green);
            font-weight: bold;
        }

        .security-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="security-icon">🛡️</div>
        <span class="uni-tag">St. Lawrence University</span>
        <h3>Reset Password</h3>
        
        {% if error %}
            <div class="alert alert-error">⚠️ {{ error }}</div>
        {% endif %}
        
        {% if message %}
            <div class="alert alert-success">✅ {{ message }}</div>
        {% endif %}

        <form action="/forgot-password" method="POST">
            <div class="form-group">
                <label>Confirm Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus>
            </div>
            
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Min. 8 characters" required>
            </div>
            
            <button type="submit" class="btn-update">Update Password</button>
        </form>

        <p class="back-link">
            <a href="/login">← Back to Login</a>
        </p>

        <div style="font-size: 10px; color: #bbb; margin-top: 25px; letter-spacing: 1px;">
            SECURE RECOVERY SYSTEM | AGRI-GUARD 2026
        </div>
    </div>
</body>
</html>
