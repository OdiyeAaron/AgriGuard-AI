<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Agri-Guard AI</title>
    <style>
        :root {
            --primary-green: #28a745;
            --dark-green: #1a472a;
            --slu-blue: #004085;
            --anim-speed: 0.7s;
        }

        /* --- 🎞️ ANIMATIONS --- */
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse-soft {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #e9f7ef 0%, #f0f2f5 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .signup-card { 
            background: white; 
            padding: 40px; 
            border-radius: 35px; 
            box-shadow: 0 20px 45px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            animation: slideInRight var(--anim-speed) ease-out forwards;
            border: 1px solid rgba(40, 167, 69, 0.1);
        }

        .uni-tag { 
            font-size: 10px; 
            letter-spacing: 3px; 
            color: var(--slu-blue); 
            font-weight: 800; 
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        h3 { 
            color: var(--dark-green); 
            margin: 10px 0 25px; 
            font-weight: 700;
            font-size: 24px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-left: 5px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            margin-top: 5px;
            border: 1.5px solid #eee; 
            border-radius: 15px; 
            box-sizing: border-box; 
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-green);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.05);
        }

        .btn-signup { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary-green); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            margin-top: 10px; 
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.2);
        }

        .btn-signup:hover { 
            background: #218838; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.3);
        }

        .alert-error {
            background: #fff5f5;
            color: #dc3545;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid #fed7d7;
        }

        .login-link {
            margin-top: 20px;
            font-size: 14px;
            color: #777;
        }

        .login-link a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 700;
        }

        .footer-logo {
            font-size: 24px;
            margin-top: 20px;
            display: inline-block;
            animation: pulse-soft 2s infinite;
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <span class="uni-tag">St. Lawrence University</span>
        <h3>Create Farmer Account</h3>
        
        {% if error %}
            <div class="alert-error">⚠️ {{ error }}</div>
        {% endif %}

        <form action="/signup" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="e.g. farmer_aaron" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min. 8 characters" required>
            </div>
            
            <button type="submit" class="btn-signup">Register for Agri-Guard</button>
        </form>

        <p class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </p>

        <div class="footer-logo">🚜</div>
        <div style="font-size: 11px; color: #aaa; margin-top: 10px;">
            Digital Agriculture Security System v2.0
        </div>
    </div>
</body>
</html>
