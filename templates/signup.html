<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Agri-Guard AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .signup-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-success { background-color: #28a745; border: none; }
    </style>
</head>
<body>
    <div class="signup-card text-center">
        <h3 class="mb-4">Create Farmer Account</h3>
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form action="/signup" method="POST">
            <div class="mb-3 text-start">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2">Create Account</button>
        </form>
        <p class="mt-3">Already have an account? <a href="/login" class="text-success">Login here</a></p>
    </div>
</body>
</html>
